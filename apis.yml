apis:
  - aid: binadox:binadox
    name: Binadox API
    description: >-
      Binadox is a SaaS spend management and optimization platform providing
      usage monitoring, license optimization, and shadow IT discovery.
      The platform integrates with cloud providers and SaaS applications to
      provide unified visibility into software spend and usage.
    humanURL: https://www.binadox.com
    tags:
